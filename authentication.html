<!DOCTYPE html>
<html>
  <head>
    <title>Login Page</title>
    <link rel="stylesheet" href="authentication.css">
  </head>
  <body>
    <div class="container">
      <div class="outer-section">
        <img class="header" src="images/leaf-img.jpg">
        <div class="inner-section">
          <div class="login-info">
            <p class="log-in">Log In</p>
            <input class="inputs" type="type" placeholder="Email">
            <input class="inputs" type="password" placeholder="Passward">
          </div>
          <div class="middle-section">
            <input class="check-box" type="checkbox">
            <p class="remember-me">Remember me</p>
            <p class="forgot-password">Forgot password?</p>
          </div>
          <div class="login-section">
            <button class="login-button">
              Log In
            </button>
            <p class="sign-in">Or Sign In with</p>
          </div>  
          <div class="logo-container">
            <img class="logo" src="images/facebook-logo.webp">
            <img class="logo" src="images/google-logo.jpg">
            <img class="logo" src="images/apple-logo.png">
          </div>
          <div class="footer">
            <p>Don't have an account? <u class="sign-up">Sign Up</u></p>
          </div>
        </div>      
      </div>

      <div class="outer-section2">
        <img class="arrow-img" src="images/arrow-img.jpg">
        <p>Sign Up</p>
        <div class="inner-section2">
          <div class="sign-up-info">          
            <input class="signup-input1" type="text" placeholder="First Name">
            <input class="signup-input" type="text" placeholder="Last Name">
            <input class="signup-input" type="text" placeholder="Email">
            <input class="signup-input" type="password" placeholder="Password">
            <input class="signup-input" type="password" placeholder="Confirm Passward">
          </div>
        
          <div class="signup-section">
            <button class="signup-button">
              Sign Up
            </button>
          </div>  
          
          <div class="footer">
            <p>Already have an account? <u class="sign-in">Sign In</u></p>
          </div>
        </div>      
      </div>
    </div>
  </body>
</html>
